<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - The New West</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #2563eb; --bg: #f8fafc; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; padding: 40px; }
        .tabs { display: flex; gap: 20px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; color: #64748b; font-weight: bold; }
        .tab.active { color: var(--blue); border-bottom: 2px solid var(--blue); margin-bottom: -2px; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 30px; display: none; }
        .main-content.active { display: grid; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); height: fit-content; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; }
        button { width: 100%; background: var(--blue); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .post-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-delete { color: #cbd5e1; cursor: pointer; border: none; background: none; }
        .btn-delete:hover { color: #ef4444; }
    </style>
</head>
<body>

    <header style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h1>Panel de Control 🤠</h1>
        <button style="width:auto;" onclick="location.href='../index.html'">Cerrar y Volver</button>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(event, 'sec-news')">Noticias</div>
        <div class="tab" onclick="switchTab(event, 'sec-events')">Eventos</div>
        <div class="tab" onclick="switchTab(event, 'sec-staff')">Staff</div>
    </div>

    <!-- SECCIÓN NOTICIAS -->
    <div id="sec-news" class="main-content active">
        <div class="card">
            <h2>Nueva Noticia</h2>
            <input type="text" id="n-title" placeholder="Título">
            <textarea id="n-content" placeholder="Contenido..."></textarea>
            <button onclick="saveToFirebase('news', 'n-title', 'n-content')">Publicar</button>
        </div>
        <div id="list-news" class="list-container"></div>
    </div>

    <!-- SECCIÓN EVENTOS -->
    <div id="sec-events" class="main-content">
        <div class="card">
            <h2>Nuevo Evento</h2>
            <input type="text" id="e-title" placeholder="Evento">
            <textarea id="e-content" placeholder="Fecha y detalles..."></textarea>
            <button onclick="saveToFirebase('events', 'e-title', 'e-content')">Programar</button>
        </div>
        <div id="list-events" class="list-container"></div>
    </div>

    <!-- SECCIÓN STAFF -->
    <div id="sec-staff" class="main-content">
        <div class="card">
            <h2>Nuevo Staff</h2>
            <input type="text" id="s-name" placeholder="Nombre">
            <input type="text" id="s-discord" placeholder="Discord (User#0000)">
            <textarea id="s-desc" placeholder="Descripción corta..."></textarea>
            <button onclick="saveStaffFirebase()">Agregar al Equipo</button>
        </div>
        <div id="list-staff" class="list-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDo7ebAVDvYEjPDscivWWKXLUoGEAGBeIM",
            authDomain: "thenewwest-7eb5f.firebaseapp.com",
            projectId: "thenewwest-7eb5f",
            storageBucket: "thenewwest-7eb5f.firebasestorage.app",
            messagingSenderId: "605270552271",
            appId: "1:605270552271:web:a58b5b7f619e5804d7d1ba",
            databaseURL: "https://thenewwest-7eb5f-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- FUNCIONES LÓGICA ---
        window.switchTab = (e, id) => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.main-content').forEach(s => s.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(id).classList.add('active');
        };

        window.saveToFirebase = (path, tId, cId) => {
            const title = document.getElementById(tId).value;
            const content = document.getElementById(cId).value;
            if(!title || !content) return alert("Completa los campos");
            
            const newRef = push(ref(db, path));
            set(newRef, { title, content, date: new Date().toLocaleDateString() });
            document.getElementById(tId).value = "";
            document.getElementById(cId).value = "";
        };

        window.saveStaffFirebase = () => {
            const title = document.getElementById('s-name').value;
            const discord = document.getElementById('s-discord').value;
            const content = document.getElementById('s-desc').value;
            if(!title || !content) return alert("Completa los campos");
            
            const newRef = push(ref(db, 'staff'));
            set(newRef, { title, discord, content, date: new Date().toLocaleDateString() });
            document.getElementById('s-name').value = "";
            document.getElementById('s-discord').value = "";
            document.getElementById('s-desc').value = "";
        };

        window.deleteItem = (path, id) => {
            if(confirm("¿Seguro que quieres borrarlo?")) {
                remove(ref(db, `${path}/${id}`));
            }
        };

        // --- RENDERIZADO EN TIEMPO REAL ---
        const setupList = (path, containerId) => {
            onValue(ref(db, path), (snapshot) => {
                const data = snapshot.val();
                const container = document.getElementById(containerId);
                container.innerHTML = "";
                if(data) {
                    Object.keys(data).forEach(id => {
                        const item = data[id];
                        container.innerHTML += `
                            <div class="post-item">
                                <div>
                                    <strong>${item.title}</strong><br>
                                    <small>${item.date}</small>
                                </div>
                                <button class="btn-delete" onclick="deleteItem('${path}', '${id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        `;
                    });
                }
            });
        };

        setupList('news', 'list-news');
        setupList('events', 'list-events');
        setupList('staff', 'list-staff');

    </script>
</body>
</html>
